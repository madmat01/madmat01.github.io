<!-- Dark mode is always on for this design -->
<script>
  document.documentElement.classList.add('dark');
  document.body && document.body.classList.add('dark');
</script>

<a class="mc-skip-link" href="/#hero">Skip to content</a>

<header class="mc-header" id="profileHeader">
  <nav class="mc-nav" role="navigation" aria-label="Main navigation">
    <div class="mc-nav-inner">

      <!-- Brand -->
      <a class="mc-nav-brand" href="{{ .Site.Home.RelPermalink }}" aria-label="{{ .Site.Title }} — home">
        {{ .Site.Params.navbar.brandName | default .Site.Title }}
      </a>

      <!-- Desktop links -->
      <ul class="mc-nav-links" role="list">
        {{ range .Site.Menus.main }}
        <li>
          <a class="mc-nav-link" href="{{ .URL }}">{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>

      <!-- CTA + hamburger -->
      <div class="mc-nav-end">
        <a class="mc-nav-cta" href="/#contact">Get in Touch</a>
        <button class="mc-nav-toggler" id="mcNavToggler"
                aria-label="Toggle navigation" aria-expanded="false" aria-controls="mcMobileNav">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="2" y1="5"  x2="20" y2="5"/>
            <line x1="2" y1="11" x2="20" y2="11"/>
            <line x1="2" y1="17" x2="20" y2="17"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- Mobile menu -->
    <div class="mc-mobile-nav" id="mcMobileNav" aria-hidden="true" role="menu">
      {{ range .Site.Menus.main }}
      <a class="mc-mobile-nav-link" href="{{ .URL }}" role="menuitem">{{ .Name }}</a>
      {{ end }}
      <a class="mc-mobile-nav-cta" href="/#contact" role="menuitem">Get in Touch</a>
    </div>
  </nav>
</header>

<script>
  (function () {
    var toggler = document.getElementById('mcNavToggler');
    var mobileNav = document.getElementById('mcMobileNav');
    if (!toggler || !mobileNav) return;
    toggler.addEventListener('click', function () {
      var isOpen = mobileNav.classList.toggle('is-open');
      toggler.setAttribute('aria-expanded', isOpen);
      mobileNav.setAttribute('aria-hidden', !isOpen);
    });
    // Close on outside click
    document.addEventListener('click', function (e) {
      if (!toggler.contains(e.target) && !mobileNav.contains(e.target)) {
        mobileNav.classList.remove('is-open');
        toggler.setAttribute('aria-expanded', 'false');
        mobileNav.setAttribute('aria-hidden', 'true');
      }
    });
  })();
</script>
