baseURL = 'https://madmat01.github.io/'
languageCode = 'en-gb'
title = 'Matthew Collinge'
theme = 'hugo-profile'

[caches]
  [caches.images]
    dir = ':cacheDir/images'
[params]
  # Theme customization
  animate = true
  customCSS = false

  [params.theme]
    defaultTheme = "dark"
    disableThemeToggle = true

  # Typography
  [params.font]
    fontSize   = "1rem"
    fontWeight = "400"
    lineHeight = "1.7"
    textAlign  = "left"

  # M3 Dark Design System — Obsidian Mint
  [params.color]
    textColor                 = "#ffffff"
    secondaryTextColor        = "#9e9e9e"
    textLinkColor             = "#00FF9D"
    backgroundColor           = "#0a0a0a"
    secondaryBackgroundColor  = "#141414"
    primaryColor              = "#00FF9D"
    secondaryColor            = "#141414"

    [params.color.darkmode]
      textColor                = "#ffffff"
      secondaryTextColor       = "#9e9e9e"
      textLinkColor            = "#00FF9D"
      backgroundColor          = "#0a0a0a"
      secondaryBackgroundColor = "#141414"
      primaryColor             = "#00FF9D"
      secondaryColor           = "#141414"

  [params.hero]
    enable = true
    intro = "Power Platform Specialist"
    title = "Matthew Collinge"
    tagline = "I build intelligent business solutions with Microsoft Power Platform."
    content = "Microsoft Power Platform specialist with expertise in Dataverse, Power Apps, and Power Automate. AI enthusiast and active speaker in the tech community."
    image = "images/profile.png"
    roundImage = false

    [params.hero.socialLinks]
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-linkedin"
        url = "https://www.linkedin.com/in/matthew-collinge1982/"

  [params.about]
    enable = true
    title = "About Me"
    content = "I am a passionate technologist focusing on the Microsoft Power Platform. I enjoy building solutions that automate business processes and improve efficiency. I am also a participant in the 90 Day Mentoring Challenge."
      [params.about.skills]
      enable = true
      title = "Here are some technologies I work with:"
      items = ["Power Apps", "Power Automate", "Dataverse", "Microsoft 365", "Azure AI"]

  [params.recentPosts]
    title = "Posts"

  [params.contact]
    enable = true
    title = "Get in Touch"
    content = "Whether you have a project in mind or just want to connect, I'd love to hear from you."
    email = "matthewjcollinge@gmail.com"
    btnName = "Say Hello"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts"
    weight = 1
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/#contact"
    weight = 2